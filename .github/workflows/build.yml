name: Build nightly

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: iOS
        type: choice
        options:
          - iOS
          - visionOS
          - macOS

jobs:
  build:
    runs-on: macos-26

    strategy:
      matrix:
        include:
          - platform: iOS
            sdk: iphoneos
          - platform: visionOS
            sdk: xros
          - platform: macOS
            sdk: macosx

    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"

      - name: Set current date
        run: echo "CURRENT_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV

      - name: Update project version
        run: sed -i '' "s/CURRENT_PROJECT_VERSION = [0-9]*;/CURRENT_PROJECT_VERSION = $CURRENT_DATE;/g" virtualportal.xcodeproj/project.pbxproj

      # -------- Build archive only for selected platform --------
      - name: Archive ${{ matrix.platform }}
        if: matrix.platform == github.event.inputs.platform
        run: |
          xcodebuild \
            -workspace virtualportal.xcodeproj/project.xcworkspace \
            -scheme virtualportal \
            -configuration Release \
            -sdk ${{ matrix.sdk }} \
            -archivePath build/${{ matrix.platform }}.xcarchive \
            archive \
            CODE_SIGN_IDENTITY= \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      # -------- iOS / visionOS → Package & Upload IPA --------
      - name: Package & Upload IPA
        if: matrix.platform != 'macOS' && matrix.platform == github.event.inputs.platform
        run: |
          mkdir -p Payload
          cp -r build/${{ matrix.platform }}.xcarchive/Products/Applications/*.app Payload/
          zip -r virtualportal-${{ matrix.platform }}.ipa Payload

      - uses: actions/upload-artifact@v4
        if: matrix.platform != 'macOS' && matrix.platform == github.event.inputs.platform
        with:
          name: virtualportal_nightly-${{ env.CURRENT_DATE }}-${{ matrix.platform }}
          path: virtualportal-${{ matrix.platform }}.ipa

      # -------- macOS → Package & Upload ZIP --------
      - name: Package & Upload macOS ZIP
        if: matrix.platform == 'macOS' && matrix.platform == github.event.inputs.platform
        run: |
          APP=$(find build/${{ matrix.platform }}.xcarchive/Products/Applications -name "*.app" -print -quit)
          ditto -c -k --sequesterRsrc --keepParent \
            "$APP" \
            virtualportal-${{ matrix.platform }}.zip

      - uses: actions/upload-artifact@v4
        if: matrix.platform == 'macOS' && matrix.platform == github.event.inputs.platform
        with:
          name: virtualportal_nightly-${{ env.CURRENT_DATE }}-${{ matrix.platform }}
          path: virtualportal-${{ matrix.platform }}.zip
